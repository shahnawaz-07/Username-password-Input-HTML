<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginPage</title>
</head>
<body>
    <h1>Login To Your Account</h1>
    <form action="post">
    
        <div>
        <label for="username">--Username--</label>
        <input type="text" id="Username" name="Username" placeholder="Enter Your Username" autofocus>
    </div>
    
    <div>
        <label for="password">--Password--</label>
        <input type="text" id="Password" name="Password" placeholder="Enter Your Password" autofocus>
    </div>
    
    <div>
        <input type="radio"id="male" name="gender" value=male>
        <label for="male">Male </label>
        <input type="radio"id="female" name="gender" value=female>
        <label for="female" >Female</label>
    </div>
    
    <div>
        <input type="CheckBox" name=Submit"" id="Submit">
        <label for="Submit">Press To Submit</label>
    </div>
    
    <div>
        <select name="REVIEW" >
        <option value="REVEIW">REVEIW</option>
        <option value="BAD">BAD</option>
        <option value="GOOD">GOOD</option>
        <option value="GREAT">GREAT</option>
        </select>
    </div>
    
    <div>
        <h1>Customer Feedback</h1>
    </div>

    <div>
        <label for="Comment">Enter Your Feedback Here!</label>
    <div>

    <div>
        <textarea name="comment"rows=10 cols="30" id=""></textarea>
    </div>

    </form>    
</body>
</html>
